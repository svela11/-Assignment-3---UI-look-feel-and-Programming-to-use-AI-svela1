<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Segoe UI, sans-serif">
  <!-- Background -->
  <rect width="900" height="520" fill="#f8f9fa" rx="16"/>
  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#1d1d2c">EduTrack - Logical Data Model</text>

  <!-- Students Table -->
  <rect x="30" y="70" width="240" height="220" rx="12" fill="#ffffff" stroke="#4361ee" stroke-width="2.5"/>
  <rect x="30" y="70" width="240" height="42" rx="12" fill="#4361ee"/>
  <rect x="30" y="100" width="240" height="12" fill="#4361ee"/>
  <text x="150" y="97" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">Students</text>
  <text x="50" y="135" font-size="13" fill="#333"><tspan font-weight="bold" fill="#ef476f">PK</tspan> StudentID (INT)</text>
  <line x1="40" y1="145" x2="260" y2="145" stroke="#e0e0e0" stroke-width="1"/>
  <text x="50" y="165" font-size="13" fill="#333">FirstName (VARCHAR)</text>
  <text x="50" y="185" font-size="13" fill="#333">LastName (VARCHAR)</text>
  <text x="50" y="205" font-size="13" fill="#333">Email (VARCHAR)</text>
  <text x="50" y="225" font-size="13" fill="#333">Major (VARCHAR)</text>
  <text x="50" y="245" font-size="13" fill="#333">EnrollmentDate (DATE)</text>
  <text x="50" y="275" font-size="11" fill="#6c757d">One Student → Many Enrollments</text>

  <!-- Instructors Table -->
  <rect x="610" y="70" width="250" height="200" rx="12" fill="#ffffff" stroke="#06d6a0" stroke-width="2.5"/>
  <rect x="610" y="70" width="250" height="42" rx="12" fill="#06d6a0"/>
  <rect x="610" y="100" width="250" height="12" fill="#06d6a0"/>
  <text x="735" y="97" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">Instructors</text>
  <text x="630" y="135" font-size="13" fill="#333"><tspan font-weight="bold" fill="#ef476f">PK</tspan> InstructorID (INT)</text>
  <line x1="620" y1="145" x2="850" y2="145" stroke="#e0e0e0" stroke-width="1"/>
  <text x="630" y="165" font-size="13" fill="#333">FirstName (VARCHAR)</text>
  <text x="630" y="185" font-size="13" fill="#333">LastName (VARCHAR)</text>
  <text x="630" y="205" font-size="13" fill="#333">Department (VARCHAR)</text>
  <text x="630" y="225" font-size="13" fill="#333">Email (VARCHAR)</text>
  <text x="630" y="255" font-size="11" fill="#6c757d">One Instructor → Many Courses</text>

  <!-- Courses Table -->
  <rect x="570" y="320" width="260" height="180" rx="12" fill="#ffffff" stroke="#ffd166" stroke-width="2.5"/>
  <rect x="570" y="320" width="260" height="42" rx="12" fill="#ffd166"/>
  <rect x="570" y="350" width="260" height="12" fill="#ffd166"/>
  <text x="700" y="347" text-anchor="middle" font-size="16" font-weight="bold" fill="#1d1d2c">Courses</text>
  <text x="590" y="385" font-size="13" fill="#333"><tspan font-weight="bold" fill="#ef476f">PK</tspan> CourseID (INT)</text>
  <line x1="580" y1="395" x2="820" y2="395" stroke="#e0e0e0" stroke-width="1"/>
  <text x="590" y="415" font-size="13" fill="#333">CourseName (VARCHAR)</text>
  <text x="590" y="435" font-size="13" fill="#333">Credits (INT)</text>
  <text x="590" y="455" font-size="13" fill="#333"><tspan font-weight="bold" fill="#4361ee">FK</tspan> InstructorID (INT)</text>
  <text x="590" y="475" font-size="13" fill="#333">Description (TEXT)</text>

  <!-- Enrollments Table -->
  <rect x="230" y="340" width="260" height="170" rx="12" fill="#ffffff" stroke="#4895ef" stroke-width="2.5"/>
  <rect x="230" y="340" width="260" height="42" rx="12" fill="#4895ef"/>
  <rect x="230" y="370" width="260" height="12" fill="#4895ef"/>
  <text x="360" y="367" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">Enrollments</text>
  <text x="250" y="405" font-size="13" fill="#333"><tspan font-weight="bold" fill="#ef476f">PK</tspan> EnrollmentID (INT)</text>
  <line x1="240" y1="415" x2="480" y2="415" stroke="#e0e0e0" stroke-width="1"/>
  <text x="250" y="435" font-size="13" fill="#333"><tspan font-weight="bold" fill="#4361ee">FK</tspan> StudentID (INT)</text>
  <text x="250" y="455" font-size="13" fill="#333"><tspan font-weight="bold" fill="#4361ee">FK</tspan> CourseID (INT)</text>
  <text x="250" y="475" font-size="13" fill="#333">Grade (VARCHAR)</text>
  <text x="250" y="495" font-size="13" fill="#333">EnrollmentDate (DATE)</text>

  <!-- Relationship Lines -->
  <!-- Students (1) to Enrollments (Many) -->
  <path d="M 150 290 L 150 330 L 310 330 L 310 340" fill="none" stroke="#4361ee" stroke-width="2.5" stroke-dasharray="none"/>
  <circle cx="150" cy="290" r="5" fill="#4361ee"/>
  <polygon points="310,340 305,330 315,330" fill="#4361ee"/>
  <text x="190" y="323" font-size="11" font-weight="bold" fill="#4361ee">1 : N</text>

  <!-- Instructors (1) to Courses (Many) -->
  <path d="M 735 270 L 735 320" fill="none" stroke="#06d6a0" stroke-width="2.5"/>
  <circle cx="735" cy="270" r="5" fill="#06d6a0"/>
  <polygon points="735,320 730,310 740,310" fill="#06d6a0"/>
  <text x="745" y="298" font-size="11" font-weight="bold" fill="#06d6a0">1 : N</text>

  <!-- Courses (1) to Enrollments (Many) -->
  <path d="M 570 420 L 490 420" fill="none" stroke="#ffd166" stroke-width="2.5"/>
  <circle cx="570" cy="420" r="5" fill="#ffd166"/>
  <polygon points="490,420 500,415 500,425" fill="#ffd166"/>
  <text x="520" y="412" font-size="11" font-weight="bold" fill="#c4a030">1 : N</text>

  <!-- Legend -->
  <rect x="30" y="460" width="180" height="45" rx="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="45" y="478" font-size="11" font-weight="bold" fill="#ef476f">PK</text>
  <text x="65" y="478" font-size="11" fill="#333">= Primary Key</text>
  <text x="45" y="495" font-size="11" font-weight="bold" fill="#4361ee">FK</text>
  <text x="65" y="495" font-size="11" fill="#333">= Foreign Key</text>
</svg>
